<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Registration System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            text-align: center;
        }
        .top-accent {
            width: 80px;
            height: 5px;
            background: linear-gradient(90deg, #6c63ff, #48c774);
            border-radius: 6px;
            margin-bottom: 1.5rem;
        }
        .badge {
            display: inline-block;
            background: #ede9ff;
            color: #6c63ff;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 14px;
            border-radius: 20px;
            margin-bottom: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        h1 {
            font-size: 36px;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 16px;
            color: #6b7280;
            margin-bottom: 3rem;
            max-width: 420px;
            line-height: 1.6;
        }
        .btn-grid {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 1.4rem 2rem;
            border-radius: 16px;
            border: 1.5px solid #dde3f5;
            background: #ffffff;
            text-decoration: none;
            min-width: 150px;
            transition: border 0.2s, transform 0.15s;
        }
        .btn:hover {
            border-color: #6c63ff;
            transform: translateY(-3px);
        }
        .btn-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .purple { background: #ede9ff; }
        .green  { background: #e8f9f0; }
        .blue   { background: #e6f1fb; }
        .btn-label {
            font-size: 14px;
            font-weight: 700;
            color: #1a1a2e;
        }
        .btn-desc {
            font-size: 11px;
            color: #9ca3af;
        }
        .stats {
            display: flex;
            gap: 2rem;
            margin-top: 3rem;
        }
        .stat-num {
            font-size: 24px;
            font-weight: 800;
            color: #6c63ff;
        }
        .stat-label {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div class="top-accent"></div>
    <span class="badge">Welcome</span>
    <h1>Course Registration</h1>
    <p class="subtitle">Hello Everyone! Welcome to our project. Explore, register and track your learning journey.</p>

    <div class="btn-grid">
        <a href="register.html" class="btn">
            <div class="btn-icon purple">📝</div>
            <span class="btn-label">Register</span>
            <span class="btn-desc">Enroll in a course</span>
        </a>
        <a href="available.html" class="btn">
            <div class="btn-icon green">📚</div>
            <span class="btn-label">Available Courses</span>
            <span class="btn-desc">Browse all courses</span>
        </a>
        <a href="enrolled.html" class="btn">
            <div class="btn-icon blue">🎓</div>
            <span class="btn-label">Enrolled Students</span>
            <span class="btn-desc">View enrollments</span>
        </a>
    </div>

    <div class="stats">
        <div class="stat">
            <div class="stat-num">15</div>
            <div class="stat-label">Courses</div>
        </div>
        <div class="stat">
            <div class="stat-num">10+</div>
            <div class="stat-label">Trainers</div>
        </div>
        <div class="stat">
            <div class="stat-num">6</div>
            <div class="stat-label">Months Max</div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrolled Students</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #f5f3ff 100%);
            min-height: 100vh;
            padding: 2.5rem 1rem;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .header-section {
            margin-bottom: 2.5rem;
        }
        
        .top-accent {
            width: 80px;
            height: 5px;
            background: linear-gradient(90deg, #6c63ff, #48c774);
            border-radius: 6px;
            margin-bottom: 1rem;
        }
        
        .badge {
            display: inline-block;
            background: #ede9ff;
            color: #6c63ff;
            font-size: 11px;
            font-weight: 700;
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 0.8rem;
            letter-spacing: 1.2px;
            text-transform: uppercase;
        }
        
        h1 {
            font-size: 32px;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        
        .subtitle {
            font-size: 15px;
            color: #6b7280;
            margin-bottom: 0;
        }
        
        .table-wrap {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            border: 1px solid #e5e7eb;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead {
            background: linear-gradient(90deg, #6c63ff 0%, #5a52d5 100%);
        }
        
        thead th {
            color: #ffffff;
            padding: 18px 24px;
            font-size: 12px;
            font-weight: 700;
            text-align: left;
            letter-spacing: 0.6px;
            text-transform: uppercase;
        }
        
        tbody tr {
            border-bottom: 1px solid #f3f4f6;
            transition: all 0.2s ease;
        }
        
        tbody tr:hover {
            background: #f9f8ff;
        }
        
        tbody tr:last-child {
            border-bottom: none;
        }
        
        tbody td {
            padding: 18px 24px;
            font-size: 14px;
            color: #374151;
        }
        
        .student-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .avatar {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            min-width: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c63ff, #48c774);
            color: #ffffff;
            font-size: 13px;
            font-weight: 700;
        }
        
        .student-name {
            font-weight: 600;
            color: #1a1a2e;
        }
        
        .email-text {
            color: #6c63ff;
            font-size: 13px;
            font-weight: 500;
        }
        
        .course-badge {
            display: inline-block;
            background: #e8f9f0;
            color: #1a7a4a;
            font-size: 12px;
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 20px;
            white-space: nowrap;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #9ca3af;
        }
        
        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        .empty-state-text {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        
        .empty-state-subtext {
            font-size: 13px;
            color: #d1d5db;
        }
        
        .error-state {
            background: #fee2e2;
            border-left: 4px solid #dc2626;
            padding: 1.5rem 2rem;
            border-radius: 8px;
        }
        
        .error-state-title {
            color: #991b1b;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .error-state-text {
            color: #7f1d1d;
            font-size: 14px;
            margin-bottom: 0.5rem;
        }
        
        .loading-spinner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem;
            gap: 1rem;
        }
        
        .spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #6c63ff;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: #6c63ff;
            margin-bottom: 0.5rem;
        }
        
        .stat-label {
            font-size: 13px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .debug-info {
            background: #fef3c7;
            border: 1px solid #fcd34d;
            border-left: 4px solid #f59e0b;
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 8px;
            font-size: 12px;
            color: #78350f;
            display: none;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 24px;
            }
            
            thead th {
                padding: 14px 12px;
                font-size: 11px;
            }
            
            tbody td {
                padding: 14px 12px;
                font-size: 13px;
            }
            
            .avatar {
                width: 32px;
                height: 32px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <div class="top-accent"></div>
            <span class="badge">Enrollments</span>
            <h1>Enrolled Students</h1>
            <p class="subtitle">Complete list of all students enrolled in courses</p>
        </div>

        <div id="debugInfo" class="debug-info"></div>

        <div id="statsContainer" class="stats" style="display: none;">
            <div class="stat-card">
                <div class="stat-number" id="totalEnrollments">0</div>
                <div class="stat-label">Total Enrollments</div>
            </div>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Student Name</th>
                        <th>Email Address</th>
                        <th>Course Enrolled</th>
                    </tr>
                </thead>
                <tbody id="enrolledtable">
                    <tr>
                        <td colspan="3">
                            <div class="loading-spinner">
                                <div class="spinner"></div>
                                <div>Loading student enrollments...</div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'https://courses-7c6p.onrender.com/api/enrollments';
        const DEBUG_MODE = true; // Set to false to hide debug info

        // Fetch and display enrollments
        async function loadEnrollments() {
            try {
                console.log('🔄 Fetching enrollments from:', API_URL);
                
                const response = await fetch(API_URL);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                let data = await response.json();
                console.log('📥 Raw API response:', data);
                console.log('📊 Response type:', typeof data);
                console.log('📌 Is Array?:', Array.isArray(data));
                
                // Handle different response formats
                let enrollments = normalizeData(data);
                
                console.log('✅ Normalized enrollments:', enrollments);
                console.log('📈 Total count:', enrollments.length);
                
                displayEnrollments(enrollments);
            } catch (error) {
                console.error('❌ Error loading enrollments:', error);
                displayError(error.message);
            }
        }

        // Normalize different API response formats
        function normalizeData(data) {
            console.log('🔍 Normalizing data...');
            
            // If it's already an array, return it
            if (Array.isArray(data)) {
                console.log('✅ Data is already an array');
                return data;
            }
            
            // If it's an object, check for common wrapper properties
            if (typeof data === 'object' && data !== null) {
                // Check for 'content' property (common in paginated responses)
                if (Array.isArray(data.content)) {
                    console.log('✅ Found data in "content" property');
                    return data.content;
                }
                
                // Check for '_embedded' property (HAL/HATEOAS format)
                if (data._embedded && Array.isArray(data._embedded.registries)) {
                    console.log('✅ Found data in "_embedded.registries" property');
                    return data._embedded.registries;
                }
                
                // Check for 'data' property
                if (Array.isArray(data.data)) {
                    console.log('✅ Found data in "data" property');
                    return data.data;
                }
                
                // Check for 'enrollments' property
                if (Array.isArray(data.enrollments)) {
                    console.log('✅ Found data in "enrollments" property');
                    return data.enrollments;
                }
                
                // If nothing found, log the structure and return empty array
                console.warn('⚠️ Unknown data structure:', Object.keys(data));
                showDebugInfo('Unexpected API response format. Properties: ' + Object.keys(data).join(', '));
                return [];
            }
            
            // If it's anything else, return empty array
            console.warn('⚠️ Data is neither array nor object');
            return [];
        }

        function displayEnrollments(enrollments) {
            const tableBody = document.getElementById('enrolledtable');
            const statsContainer = document.getElementById('statsContainer');
            
            // Handle empty list
            if (!enrollments || enrollments.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="3">
                            <div class="empty-state">
                                <div class="empty-state-icon">📭</div>
                                <div class="empty-state-text">No students enrolled yet</div>
                                <div class="empty-state-subtext">Enrollments will appear here once students register for courses</div>
                            </div>
                        </td>
                    </tr>
                `;
                statsContainer.style.display = 'none';
                return;
            }

            // Clear loading state
            tableBody.innerHTML = '';

            // Add enrollment rows
            enrollments.forEach((enrollment, index) => {
                try {
                    const row = createEnrollmentRow(enrollment);
                    tableBody.appendChild(row);
                } catch (error) {
                    console.error(`❌ Error processing enrollment ${index}:`, error, enrollment);
                }
            });

            // Show stats
            document.getElementById('totalEnrollments').textContent = enrollments.length;
            statsContainer.style.display = 'grid';

            console.log(`✅ Successfully displayed ${enrollments.length} enrollment(s)`);
        }

        function createEnrollmentRow(enrollment) {
            const row = document.createElement('tr');

            // Safely extract data with fallbacks
            const name = getSafeValue(enrollment, 'name', 'Unknown Student');
            const email = getSafeValue(enrollment, 'email', 'N/A');
            
            // Extract course name - handle nested course object
            let courseName = 'Unknown Course';
            if (enrollment.course) {
                if (typeof enrollment.course === 'string') {
                    courseName = enrollment.course;
                } else if (typeof enrollment.course === 'object') {
                    courseName = enrollment.course.coursename 
                        || enrollment.course.name 
                        || enrollment.course.courseId 
                        || 'Unknown Course';
                }
            } else if (enrollment.coursename) {
                courseName = enrollment.coursename;
            } else if (enrollment.courseid) {
                courseName = enrollment.courseid;
            }

            // Generate initials for avatar
            const initials = name
                .split(' ')
                .map(part => part.charAt(0))
                .join('')
                .toUpperCase()
                .slice(0, 2) || '?';

            // Build row HTML
            row.innerHTML = `
                <td>
                    <div class="student-cell">
                        <div class="avatar">${escapeHtml(initials)}</div>
                        <div class="student-name">${escapeHtml(name)}</div>
                    </div>
                </td>
                <td>
                    <div class="email-text">${escapeHtml(email)}</div>
                </td>
                <td>
                    <span class="course-badge">${escapeHtml(courseName)}</span>
                </td>
            `;

            return row;
        }

        function getSafeValue(obj, key, defaultValue = 'N/A') {
            try {
                const value = obj[key];
                return value ? String(value).trim() : defaultValue;
            } catch (e) {
                return defaultValue;
            }
        }

        function displayError(message) {
            const tableBody = document.getElementById('enrolledtable');
            tableBody.innerHTML = `
                <tr>
                    <td colspan="3">
                        <div class="error-state">
                            <div class="error-state-title">❌ Failed to Load Enrollments</div>
                            <div class="error-state-text">${escapeHtml(message)}</div>
                            <div class="error-state-text">
                                <strong>Troubleshooting:</strong>
                            </div>
                            <div class="error-state-text">
                                1. Make sure your backend is running<br>
                                2. Check that the API URL is correct<br>
                                3. Verify your database has enrollment data<br>
                                4. Check browser console (F12) for more details
                            </div>
                        </div>
                    </td>
                </tr>
            `;
        }

        function showDebugInfo(message) {
            if (DEBUG_MODE) {
                const debugDiv = document.getElementById('debugInfo');
                debugDiv.textContent = '🔍 Debug: ' + message;
                debugDiv.style.display = 'block';
            }
        }

        // Utility function to prevent XSS attacks
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        // Load enrollments when page loads
        window.addEventListener('DOMContentLoaded', loadEnrollments);
    </script>
</body>
</html>
